events { }

http {
    sendfile on;

    client_max_body_size 20M;

    upstream app_servers {
        server afcstudio:8080;
    }

    upstream minigameback_https {
        server minigameback:5001; 
    }
    server {
        listen 80;
        listen [::]:80;
        server_name afcstudio.ru www.afcstudio.ru;

        location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        }

	location / {
            proxy_pass         http://app_servers;
            proxy_http_version 1.1;
            
            # Стандартные заголовки для корректной работы прокси
            proxy_set_header   Connection ""; 
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
	}
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/certificate.crt;
        ssl_certificate_key /etc/nginx/certs/private.key;

	ssl_protocols TLSv1.2 TLSv1.3; # Рекомендуемые протоколы
        ssl_ciphers HIGH:!aNULL:!MD5; # Рекомендуемые шифры

        location / {
            proxy_pass         http://minigameback_https;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection keep-alive;
            proxy_set_header   Host $host;
            proxy_cache_bypass   $http_upgrade;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
